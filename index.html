<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriSignal — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <span>🌾</span>
      <span>AgriSignal</span>
    </div>
    <p class="login-tagline">
      Fertilizer price intelligence for farmers — powered by natural gas market data.
    </p>

    <form id="loginForm" novalidate>
      <div class="field-group">
        <label class="field-label" for="emailInput">Your Email</label>
        <input
          type="email"
          id="emailInput"
          class="input-field"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
        <p class="field-hint">Your farm profile is saved to this email.</p>
      </div>

      <p id="loginError" class="error-text" style="display:none; margin-bottom:12px;"></p>

      <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%; justify-content:center; padding:13px;">
        Sign In →
      </button>
    </form>

    <p class="login-footer">
      No password required for this demo. Your data is private to your email.
    </p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>initLogin();</script>
</body>
</html>
